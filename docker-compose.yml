# ============================================================
# CyTrack — Docker Compose (Development)
# ============================================================
# Usage:
#   docker compose up -d          → Start all services
#   docker compose logs -f web    → Follow web logs
#   docker compose exec web bash  → Shell into web container
# ============================================================

version: '3.9'

services:

  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cytrack_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-cytrackdb}
      POSTGRES_USER: ${DB_USER:-cytrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cytrackpass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cytrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Message Broker + Channels) ────────────
  redis:
    image: redis:7-alpine
    container_name: cytrack_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django + Uvicorn (ASGI Web Server) ──────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cytrack_web
    command: web
    restart: unless-stopped
    volumes:
      - .:/app
      - staticfiles_vol:/app/staticfiles
      - media_vol:/app/media
    env_file:
      - .env/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_ENV: development
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ping/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ─── Celery Worker ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cytrack_worker
    command: worker
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat Scheduler ────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cytrack_beat
    command: beat
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cytrack_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles_vol:/app/staticfiles:ro
      - media_vol:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  staticfiles_vol:
  media_vol:
