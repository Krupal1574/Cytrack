version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=cytrack
      - POSTGRES_USER=cytrack_user
      - POSTGRES_PASSWORD=cytrack_pass
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 cyber.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=cytrack
      - DB_USER=cytrack_user
      - DB_PASSWORD=cytrack_pass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      # Include API keys here, e.g., OTX_API_KEY, ABUSEIPDB_API_KEY
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A cyber worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DB_NAME=cytrack
      - DB_USER=cytrack_user
      - DB_PASSWORD=cytrack_pass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A cyber beat -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DB_NAME=cytrack
      - DB_USER=cytrack_user
      - DB_PASSWORD=cytrack_pass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
